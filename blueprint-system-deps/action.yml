name: 'Blueprint system dependencies'
description: >-
  Install the TeX, dvisvgm and Graphviz system packages needed to compile a
  leanblueprint (`leanblueprint web` / `leanblueprint pdf`), with an apt archive
  cache so repeat runs do not re-download the packages.

inputs:
  cache-suffix:
    description: 'Cache suffix that distinguishes this package set from others.'
    required: false
    default: 'web-v1'
  extra-packages:
    description: 'Additional apt packages to install (space-separated).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Prepare blueprint apt archive cache
      id: blueprint-apt-cache-path
      shell: bash
      run: |
        . /etc/os-release
        cache_key_segment="${VERSION_CODENAME:-${VERSION_ID:-unknown}}"
        archive_dir="$RUNNER_TEMP/blueprint-apt-archives/${{ inputs.cache-suffix }}"

        mkdir -p "$archive_dir/partial"
        if [ ! -d "$archive_dir" ] || [ -L "$archive_dir" ]; then
          echo "::error::Apt archive cache path must be a real directory: $archive_dir"
          exit 1
        fi

        echo "cache-key-segment=$cache_key_segment" >> "$GITHUB_OUTPUT"
        echo "archive-dir=$archive_dir" >> "$GITHUB_OUTPUT"

    - name: Restore blueprint apt archive cache
      id: blueprint-apt-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.blueprint-apt-cache-path.outputs.archive-dir }}
        key: blueprint-apt-${{ runner.os }}-${{ runner.arch }}-${{ steps.blueprint-apt-cache-path.outputs.cache-key-segment }}-${{ inputs.cache-suffix }}

    - name: Install blueprint system dependencies
      shell: bash
      env:
        APT_CACHE_DIR: ${{ steps.blueprint-apt-cache-path.outputs.archive-dir }}
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      run: |
        sudo apt-get update

        apt_cache_dir="$APT_CACHE_DIR"
        mkdir -p "$apt_cache_dir/partial"
        if [ ! -d "$apt_cache_dir" ] || [ -L "$apt_cache_dir" ]; then
          echo "::error::Apt archive cache path must be a real directory: $apt_cache_dir"
          exit 1
        fi

        packages=(
          chktex
          dvisvgm
          graphviz
          latexmk
          libgraphviz-dev
          texlive-extra-utils
          texlive-fonts-recommended
          texlive-latex-extra
          texlive-pictures
          texlive-xetex
        )

        if [ -n "$EXTRA_PACKAGES" ]; then
          read -r -a extra_packages <<< "$EXTRA_PACKAGES"
          packages+=("${extra_packages[@]}")
        fi

        sudo apt-get install -y \
          -o Dir::Cache::archives="$apt_cache_dir" \
          "${packages[@]}"

        sudo chown -R "$USER:$(id -gn)" "$apt_cache_dir"

    - name: Save blueprint apt archive cache
      if: steps.blueprint-apt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.blueprint-apt-cache-path.outputs.archive-dir }}
        key: ${{ steps.blueprint-apt-cache.outputs.cache-primary-key }}
