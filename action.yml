name: 'Setup Lean Environment'
description: 'Set up a Lean toolchain with the Mathlib build cache. For blueprints, compose the leanblueprint actions in this repo.'

branding:
  icon: check-circle
  color: purple

# This is the primary action of the repository, so it lives at the repository
# root and can be referenced as `texra-ai/lean-env-action@<ref>`. It sets up
# Lean only; the blueprint tooling is provided by the sibling actions so the
# leanblueprint install lives in exactly one place:
#   - uses: texra-ai/lean-env-action/leanblueprint@<ref>         # the tool
#   - uses: texra-ai/lean-env-action/blueprint-system-deps@<ref> # the TeX stack

inputs:
  use-github-cache:
    description: 'Enable lean-action GitHub caching for the .lake directory.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Lean toolchain and Mathlib cache
      uses: leanprover/lean-action@v1
      with:
        use-mathlib-cache: true
        use-github-cache: ${{ inputs.use-github-cache }}
        build: false
